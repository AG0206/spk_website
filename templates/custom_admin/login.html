{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – SPK Organisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root{--navy:#1c2b4a;--navy-mid:#263450;--gold:#b8935a;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--sans);min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .bg-blob{position:absolute;border-radius:50%;pointer-events:none;}
    .bg-blob-1{width:600px;height:600px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(184,147,90,.12) 0%,transparent 70%);}
    .bg-blob-2{width:400px;height:400px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(197,227,239,.08) 0%,transparent 70%);}
    .login-card{background:#fff;border-radius:12px;padding:52px 44px;width:100%;max-width:420px;position:relative;z-index:2;box-shadow:0 32px 80px rgba(0,0,0,.3);}
    .login-logo{text-align:center;margin-bottom:32px;}
    .logo-circle{width:60px;height:60px;background:var(--navy);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px;}
    .logo-circle::after{content:'';position:absolute;inset:4px;border-radius:50%;border:1.5px solid var(--gold);opacity:.7;}
    .logo-circle span{font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;position:relative;z-index:1;}
    .login-logo h1{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--navy);}
    .login-logo p{font-size:11px;color:#8898b8;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4a5878;margin-bottom:7px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8898b8;font-size:16px;pointer-events:none;}
    .form-group input{width:100%;padding:13px 16px 13px 42px;border:1.5px solid rgba(28,43,74,.12);border-radius:6px;font-size:14px;color:var(--navy);background:#fff;outline:none;transition:border-color .25s,box-shadow .25s;font-family:var(--sans);}
    .form-group input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(28,43,74,.08);}
    .btn-login{width:100%;background:var(--navy);color:#fff;border:none;padding:14px;border-radius:6px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:background .25s,transform .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-login:hover{background:var(--navy-mid);transform:translateY(-1px);}
    .alert-error{background:#fef0f0;border:1px solid #f5b8b8;color:#9b1c1c;padding:12px 16px;border-radius:6px;font-size:13.5px;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
    .back-link{text-align:center;margin-top:20px;}
    .back-link a{font-size:13px;color:#8898b8;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color .2s;}
    .back-link a:hover{color:var(--navy);}
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle"><span>SPK</span></div>
      <h1>Admin Panel</h1>
      <p>SPK Organisation</p>
    </div>
    {% if error %}<div class="alert-error"><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="bi bi-person-fill"></i>
          <input type="text" name="username" placeholder="Enter your username" required autofocus/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="password" placeholder="Enter your password" required/>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
    </form>
    <div class="back-link"><a href="/"><i class="bi bi-arrow-left"></i> Back to Website</a></div>
  </div>
</body>
</html>
